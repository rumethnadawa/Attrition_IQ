name: AttritionIQ CI/CD Pipeline

on:
  push:
    branches: [AttritionIQ]
  workflow_dispatch:

# Required for GitHub OIDC token (keyless AWS auth)
permissions:
  id-token: write   # needed when AWS_ROLE_ARN is set
  contents: read
  actions:  read

env:
  AWS_REGION:       us-east-1
  ECR_REPOSITORY:   attritioniq-app
  ECS_CLUSTER:      attritioniq-cluster
  ECS_SERVICE:      attritioniq-service
  CONTAINER_NAME:   attritioniq-container
  TASK_FAMILY:      attritioniq-task

# ──────────────────────────────────────────────────────────────
jobs:

  # ── Stage 1: Test ──────────────────────────────────────────
  # Tests mock all AWS calls — no real credentials needed here
  test:
    name: "🧪 Run Test Suite"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run pytest (AWS is fully mocked)
        run: pytest tests/ -v --tb=short
        env:
          # Dummy values — all AWS calls are mocked in tests
          AWS_ACCESS_KEY_ID:     dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_DEFAULT_REGION:    ${{ env.AWS_REGION }}
          S3_BUCKET_NAME:        dummy-bucket

  # ── Stage 2: Build, Scan & Push Docker Image to ECR ────────
  build:
    name: "🐳 Build, Scan & Push to ECR"
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push-image.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # If AWS_ROLE_ARN secret is set → uses OIDC (keyless)
          # If not set         → falls back to access key + secret below
          role-to-assume:        ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Cache Docker layers — speeds up builds by ~60%
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Step A: Build image locally (with layer cache)
      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to   type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # Step B: Scan for vulnerabilities BEFORE pushing to ECR
      - name: "🔍 Scan image for vulnerabilities (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          format:         "table"
          exit-code:      "0"     # warn only — change to '1' to block on CRITICAL
          severity:       "CRITICAL,HIGH"
          ignore-unfixed: true

      # Step C: Push to ECR
      - name: Tag & push image to ECR
        id: push-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ── Stage 3: SageMaker Training Job ────────────────────────
  sagemaker-train:
    name: "🤖 SageMaker Training"
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install SageMaker SDK
        run: pip install boto3 sagemaker python-dotenv

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Create .env for pipeline script
        run: |
          echo "AWS_DEFAULT_REGION=${{ env.AWS_REGION }}" >> .env
          echo "S3_BUCKET_NAME=${{ secrets.S3_BUCKET }}"  >> .env

      - name: Run SageMaker training job
        run: |
          python sagemaker_pipeline.py \
            --mode train \
            --job-suffix ${{ github.sha }} \
            --s3-bucket  ${{ secrets.S3_BUCKET }}

      - name: Upload model URI artifact
        uses: actions/upload-artifact@v4
        with:
          name: sagemaker-model-uri
          path: .sagemaker_model_uri

  # ── Stage 4: Deploy to ECS Fargate ─────────────────────────
  deploy-ecs:
    name: "🚀 Deploy to ECS Fargate"
    needs: [build, sagemaker-train]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ needs.build.outputs.image }}

      - name: Deploy updated task to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.task-def.outputs.task-definition }}
          service:                    ${{ env.ECS_SERVICE }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── Stage 5: Verify Live Deployment ────────────────────────
  verify:
    name: "✅ Verify Deployment"
    needs: deploy-ecs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install boto3
        run: pip install boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Run health check against live ECS task
        run: python .github/scripts/verify_deployment.py
        env:
          ECS_CLUSTER:        ${{ env.ECS_CLUSTER }}
          ECS_SERVICE:        ${{ env.ECS_SERVICE }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

  # ── Stage 6: Notify via SNS ────────────────────────────────
  notify:
    name: "📣 Pipeline Notification"
    needs: verify
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Send pipeline result via SNS
        run: |
          STATUS="${{ needs.verify.result }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ AttritionIQ deployment SUCCEEDED on commit ${{ github.sha }} by ${{ github.actor }}"
          else
            MSG="❌ AttritionIQ deployment FAILED on commit ${{ github.sha }}. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          aws sns publish \
            --topic-arn "${{ secrets.SNS_TOPIC_ARN }}" \
            --subject   "AttritionIQ CI/CD — $STATUS" \
            --message   "$MSG" || echo "SNS publish skipped (SNS_TOPIC_ARN not configured)"

  # ── Stage 7: Auto-Rollback (runs ONLY on failure) ──────────
  rollback:
    name: "⏪ Auto-Rollback ECS"
    needs: [deploy-ecs, verify]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.deploy-ecs.result == 'failure' || needs.verify.result == 'failure')

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:        ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Rollback ECS to previous task definition
        run: |
          echo "⏪ Rolling back ECS service to previous task definition..."
          FAMILY=${{ env.TASK_FAMILY }}
          CURRENT=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "  Current (failed): $CURRENT"
          CURRENT_REV=$(echo $CURRENT | grep -o '[0-9]*$')
          PREV_REV=$((CURRENT_REV - 1))
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          PREV_TASK="arn:aws:ecs:${{ env.AWS_REGION }}:$ACCOUNT:task-definition/$FAMILY:$PREV_REV"
          echo "  Rolling back to: $PREV_TASK"
          aws ecs update-service \
            --cluster  ${{ env.ECS_CLUSTER }} \
            --service  ${{ env.ECS_SERVICE }} \
            --task-definition $PREV_TASK
          echo "  ✅ Rollback initiated."

      - name: Notify rollback via SNS
        run: |
          aws sns publish \
            --topic-arn "${{ secrets.SNS_TOPIC_ARN }}" \
            --subject   "⏪ AttritionIQ — Auto-Rollback Triggered" \
            --message   "Deployment FAILED on commit ${{ github.sha }}. ECS has been automatically rolled back. Review: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "SNS publish skipped"
